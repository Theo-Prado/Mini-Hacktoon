<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub User Explorer</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-900 text-white min-h-screen p-8">

  <div class="max-w-6xl mx-auto">

    <h1 class="text-5xl font-bold text-center mb-10">
      GitHub User Explorer
    </h1>

    <div class="flex justify-center gap-4 mb-10 flex-wrap">

      <input
        id="username"
        type="text"
        placeholder="Digite um usuário do GitHub"
        class="p-4 rounded-xl w-96 text-black outline-none"
      >

      <button
        id="searchBtn"
        class="bg-blue-600 px-6 py-4 rounded-xl hover:bg-blue-700 cursor-pointer transition"
      >
        Pesquisar
      </button>

    </div>

    <div id="loading" class="hidden text-center text-xl text-blue-400">
      Carregando...
    </div>

    <div id="error" class="hidden text-center text-xl text-red-400 mb-6"></div>

    <div id="content"></div>

  </div>

<script>

async function buscarUsuario() {

  const username = document.getElementById('username').value.trim();
  const loadingDiv = document.getElementById('loading');
  const contentDiv = document.getElementById('content');
  const errorDiv = document.getElementById('error');

  // Limpar erros anteriores
  errorDiv.classList.add('hidden');
  errorDiv.textContent = '';

  // Validar entrada
  if (!username) {
    errorDiv.textContent = 'Por favor, digite um nome de usuário!';
    errorDiv.classList.remove('hidden');
    return;
  }

  try {
    // Mostrar carregamento
    loadingDiv.classList.remove('hidden');
    contentDiv.innerHTML = '';

    // Buscar dados do usuário
    const response = await fetch(`https://api.github.com/users/${username}`);

    if (!response.ok) {
      throw new Error('Usuário não encontrado');
    }

    const user = await response.json();

    // Buscar repositórios do usuário
    const reposResponse = await fetch(`https://api.github.com/users/${username}/repos?sort=stars&order=desc&per_page=6`);
    const repos = await reposResponse.json();

    // Buscar perfis parecidos
    const similarUsers = await buscarPerfisParecidos(user, repos);

    // Ocultar carregamento
    loadingDiv.classList.add('hidden');

    // Renderizar dados
    renderizarUsuario(user, repos, similarUsers);

  } catch (error) {
    loadingDiv.classList.add('hidden');
    errorDiv.textContent = error.message;
    errorDiv.classList.remove('hidden');
  }

}

async function buscarPerfisParecidos(user, repos) {
  try {
    const linguagensComuns = extrairLinguagensComuns(repos);
    const queries = [];

    // Buscar por localização se disponível
    if (user.location && user.location.trim()) {
      queries.push(`location:"${user.location}" followers:>10 repos:>2`);
    }

    // Buscar por linguagem principal
    if (linguagensComuns.length > 0) {
      const linguagem = linguagensComuns[0];
      queries.push(`language:${linguagem} followers:>10 repos:>2`);
    }

    // Buscar por range de seguidores similar
    const minSeguidores = Math.max(Math.floor(user.followers * 0.5), 1);
    const maxSeguidores = Math.ceil(user.followers * 2);
    queries.push(`followers:${minSeguidores}..${maxSeguidores} repos:>2`);

    let usuariosPaRecidos = [];

    for (const query of queries) {
      if (usuariosPaRecidos.length >= 6) break;

      try {
        const response = await fetch(`https://api.github.com/search/users?q=${encodeURIComponent(query)}&sort=followers&order=desc&per_page=6`);
        
        if (response.ok) {
          const data = await response.json();
          const items = data.items || [];

          for (const usuario of items) {
            // Evitar duplicatas e o próprio usuário
            if (usuario.login !== user.login && 
                !usuariosPaRecidos.find(u => u.login === usuario.login)) {
              // Buscar dados completos do usuário
              const userFullData = await fetch(`https://api.github.com/users/${usuario.login}`);
              const userFull = await userFullData.json();
              usuariosPaRecidos.push(userFull);

              if (usuariosPaRecidos.length >= 6) break;
            }
          }
        }
      } catch (e) {
        console.log('Erro ao buscar variação:', e);
      }
    }

    return usuariosPaRecidos.slice(0, 6);
  } catch (error) {
    console.log('Erro ao buscar perfis parecidos:', error);
    return [];
  }
}

function extrairLinguagensComuns(repos) {
  const linguagens = {};

  repos.forEach(repo => {
    if (repo.language) {
      linguagens[repo.language] = (linguagens[repo.language] || 0) + 1;
    }
  });

  return Object.keys(linguagens)
    .sort((a, b) => linguagens[b] - linguagens[a])
    .slice(0, 3);
}

function renderizarUsuario(user, repos, similarUsers = []) {
  const contentDiv = document.getElementById('content');

  contentDiv.innerHTML = `
    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
      
      <div class="md:col-span-1">
        <div class="bg-slate-800 rounded-xl p-6 text-center">
          <img src="${user.avatar_url}" alt="${user.login}" class="w-32 h-32 rounded-full mx-auto mb-4">
          <h2 class="text-2xl font-bold mb-2">${user.name || user.login}</h2>
          <p class="text-gray-400 mb-4">@${user.login}</p>
          ${user.bio ? `<p class="text-gray-300 mb-4">${user.bio}</p>` : ''}
          <a href="${user.html_url}" target="_blank" class="bg-blue-600 px-4 py-2 rounded-lg hover:bg-blue-700 inline-block">
            Visitar Perfil
          </a>
        </div>

        <div class="bg-slate-800 rounded-xl p-6 mt-6">
          <h3 class="text-xl font-bold mb-4">Estatísticas</h3>
          <div class="space-y-2 text-sm">
            <p>👥 Seguidores: <span class="font-bold">${user.followers}</span></p>
            <p>📌 Seguindo: <span class="font-bold">${user.following}</span></p>
            <p>📦 Repositórios: <span class="font-bold">${user.public_repos}</span></p>
            <p>📍 Local: <span class="font-bold">${user.location || 'Não informado'}</span></p>
          </div>
        </div>
      </div>

      <div class="md:col-span-2">
        <h3 class="text-2xl font-bold mb-4">Repositórios em Destaque</h3>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          ${repos.map(repo => `
            <a href="${repo.html_url}" target="_blank" class="bg-slate-800 rounded-xl p-4 hover:bg-slate-700 transition">
              <h4 class="font-bold text-lg mb-2 text-blue-400">${repo.name}</h4>
              <p class="text-gray-300 text-sm mb-3">${repo.description || 'Sem descrição'}</p>
              <div class="flex gap-4 text-xs text-gray-400">
                ${repo.language ? `<span>💻 ${repo.language}</span>` : ''}
                <span>⭐ ${repo.stargazers_count}</span>
                <span>🔀 ${repo.forks_count}</span>
              </div>
            </a>
          `).join('')}
        </div>
      </div>

    </div>

    ${similarUsers.length > 0 ? `
      <div class="mt-12">
        <h3 class="text-3xl font-bold mb-6">👥 Perfis Parecidos</h3>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
          ${similarUsers.map(similarUser => `
            <div class="bg-slate-800 rounded-xl p-6 hover:bg-slate-700 transition">
              <div class="text-center mb-4">
                <img src="${similarUser.avatar_url}" alt="${similarUser.login}" class="w-24 h-24 rounded-full mx-auto mb-3">
                <h4 class="text-xl font-bold text-blue-400">${similarUser.name || similarUser.login}</h4>
                <p class="text-gray-400 text-sm">@${similarUser.login}</p>
              </div>
              
              ${similarUser.bio ? `<p class="text-gray-300 text-sm mb-3 text-center">${similarUser.bio}</p>` : ''}
              
              <div class="grid grid-cols-3 gap-2 text-center text-xs mb-4">
                <div class="bg-slate-700 rounded p-2">
                  <p class="text-gray-400">Seguidores</p>
                  <p class="font-bold">${similarUser.followers}</p>
                </div>
                <div class="bg-slate-700 rounded p-2">
                  <p class="text-gray-400">Repos</p>
                  <p class="font-bold">${similarUser.public_repos}</p>
                </div>
                <div class="bg-slate-700 rounded p-2">
                  <p class="text-gray-400">Seguindo</p>
                  <p class="font-bold">${similarUser.following}</p>
                </div>
              </div>

              <a href="${similarUser.html_url}" target="_blank" class="block w-full text-center bg-blue-600 px-3 py-2 rounded-lg hover:bg-blue-700 transition text-sm font-semibold">
                Ver Perfil
              </a>
            </div>
          `).join('')}
        </div>
      </div>
    ` : ''}
  `;
}

document.addEventListener('DOMContentLoaded', () => {

  const button = document.getElementById('searchBtn');
  const input = document.getElementById('username');

  button.onclick = buscarUsuario;

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      buscarUsuario();
    }
  });

});

</script>

</body>
</html>
